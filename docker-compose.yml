version: '3.8'

services:
  backend:
    build:
      context: ./apps/backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080

  frontend:
    build:
      context: ./apps/frontend
    ports:
      - "80:80"
    environment:
      - BACKEND_API_URL=http://backend:8080
    depends_on:
      - backend
