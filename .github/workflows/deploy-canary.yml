name: Deploy Canary

on:
  workflow_dispatch:
    inputs:
      canary_weight:
        description: 'Traffic percentage for the canary revision'
        required: true
        default: '20'

env:
  ACR_NAME: "crsredemodemosea"
  RG_NAME: "rg-sre-demo-demo-sea"
  APP_NAME: "ca-sre-demo-demo-sea-backend"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          
      - name: Deploy Canary Revision
        run: |
          REVISION_SUFFIX="canary-${{ github.sha }}"
          VERSION="${{ github.sha }}-canary"
          
          # Deploy new revision
          az containerapp update \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RG_NAME }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/backend:${{ github.sha }} \
            --revision-suffix $REVISION_SUFFIX \
            --set-env-vars APP_VERSION=$VERSION

          # Get stable revision name
          STABLE_REV=$(az containerapp revision list -n ${{ env.APP_NAME }} -g ${{ env.RG_NAME }} --query "[?properties.trafficWeight > \`0\`].name | [0]" -o tsv)
          STABLE_WEIGHT=$((100 - ${{ github.event.inputs.canary_weight }}))
          
          # Set traffic split
          az containerapp ingress traffic set \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RG_NAME }} \
            --revision-weight ${STABLE_REV}=${STABLE_WEIGHT} ${{ env.APP_NAME }}--${REVISION_SUFFIX}=${{ github.event.inputs.canary_weight }} \
            --label-weight stable=${STABLE_WEIGHT} canary=${{ github.event.inputs.canary_weight }}
