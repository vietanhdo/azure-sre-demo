name: Deploy Canary

on:
  workflow_dispatch:
    inputs:
      canary_weight:
        description: 'Traffic percentage for the canary revision'
        required: true
        default: '20'
      deploy_backend:
        description: 'Deploy Backend'
        type: boolean
        required: true
        default: true
      deploy_frontend:
        description: 'Deploy Frontend'
        type: boolean
        required: true
        default: true

env:
  ACR_NAME: "crsredemodemosea"
  RG_NAME: "rg-sre-demo-demo-sea"
  BACKEND_APP_NAME: "ca-sre-demo-demo-sea-backend"
  FRONTEND_APP_NAME: "ca-sre-demo-demo-sea-frontend"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          
      - name: Deploy Canary Revision (Backend)
        if: github.event.inputs.deploy_backend == 'true'
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          REVISION_SUFFIX="canary-${SHORT_SHA}"
          VERSION="${SHORT_SHA}-canary"
          
          # Get stable revision name BEFORE deploying the new one
          STABLE_REV=$(az containerapp revision list -n ${{ env.BACKEND_APP_NAME }} -g ${{ env.RG_NAME }} --query "[?properties.trafficWeight > \`0\`].name | [0]" -o tsv)
          STABLE_WEIGHT=$((100 - ${{ github.event.inputs.canary_weight }}))
          
          # Deploy new revision (which automatically gets 100% traffic momentarily)
          az containerapp update \
            --name ${{ env.BACKEND_APP_NAME }} \
            --resource-group ${{ env.RG_NAME }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/backend:${{ github.sha }} \
            --revision-suffix $REVISION_SUFFIX \
            --set-env-vars APP_VERSION=$VERSION

          # Set traffic split using revision names
          az containerapp ingress traffic set \
            --name ${{ env.BACKEND_APP_NAME }} \
            --resource-group ${{ env.RG_NAME }} \
            --revision-weight ${STABLE_REV}=${STABLE_WEIGHT} ${{ env.BACKEND_APP_NAME }}--${REVISION_SUFFIX}=${{ github.event.inputs.canary_weight }}
            
          # Add labels so the SRE Agent can target them by label
          az containerapp revision label add -n ${{ env.BACKEND_APP_NAME }} -g ${{ env.RG_NAME }} --label stable --revision ${STABLE_REV} -y
          az containerapp revision label add -n ${{ env.BACKEND_APP_NAME }} -g ${{ env.RG_NAME }} --label canary --revision ${{ env.BACKEND_APP_NAME }}--${REVISION_SUFFIX} -y

          # Deactivate 0 traffic active revisions
          az containerapp revision list -n ${{ env.BACKEND_APP_NAME }} -g ${{ env.RG_NAME }} --query "[?properties.active && properties.trafficWeight == \`0\`].name" -o tsv | while read rev; do echo "Deactivating $rev"; az containerapp revision deactivate -n ${{ env.BACKEND_APP_NAME }} -g ${{ env.RG_NAME }} --revision "$rev"; done

      - name: Deploy Canary Revision (Frontend)
        if: github.event.inputs.deploy_frontend == 'true'
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          REVISION_SUFFIX="canary-${SHORT_SHA}"
          VERSION="${SHORT_SHA}-canary"
          
          # Get stable revision name BEFORE deploying the new one
          STABLE_REV=$(az containerapp revision list -n ${{ env.FRONTEND_APP_NAME }} -g ${{ env.RG_NAME }} --query "[?properties.trafficWeight > \`0\`].name | [0]" -o tsv)
          STABLE_WEIGHT=$((100 - ${{ github.event.inputs.canary_weight }}))

          # Deploy new revision
          az containerapp update \
            --name ${{ env.FRONTEND_APP_NAME }} \
            --resource-group ${{ env.RG_NAME }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }} \
            --revision-suffix $REVISION_SUFFIX \
            --set-env-vars APP_VERSION=$VERSION
          
          # Set traffic split using revision names
          az containerapp ingress traffic set \
            --name ${{ env.FRONTEND_APP_NAME }} \
            --resource-group ${{ env.RG_NAME }} \
            --revision-weight ${STABLE_REV}=${STABLE_WEIGHT} ${{ env.FRONTEND_APP_NAME }}--${REVISION_SUFFIX}=${{ github.event.inputs.canary_weight }}

          # Add labels so the SRE Agent can target them by label
          az containerapp revision label add -n ${{ env.FRONTEND_APP_NAME }} -g ${{ env.RG_NAME }} --label stable --revision ${STABLE_REV} -y
          az containerapp revision label add -n ${{ env.FRONTEND_APP_NAME }} -g ${{ env.RG_NAME }} --label canary --revision ${{ env.FRONTEND_APP_NAME }}--${REVISION_SUFFIX} -y

          # Deactivate 0 traffic active revisions
          az containerapp revision list -n ${{ env.FRONTEND_APP_NAME }} -g ${{ env.RG_NAME }} --query "[?properties.active && properties.trafficWeight == \`0\`].name" -o tsv | while read rev; do echo "Deactivating $rev"; az containerapp revision deactivate -n ${{ env.FRONTEND_APP_NAME }} -g ${{ env.RG_NAME }} --revision "$rev"; done
