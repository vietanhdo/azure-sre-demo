name: CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'apps/backend/**'
      - 'apps/frontend/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'apps/backend/**'
      - 'apps/frontend/**'
      - '.github/workflows/**'

env:
  ACR_NAME: "crsredemodemosea"
  RG_NAME: "rg-sre-demo-demo-sea"
  BACKEND_APP_NAME: "ca-sre-demo-demo-sea-backend"
  FRONTEND_APP_NAME: "ca-sre-demo-demo-sea-frontend"

permissions:
  id-token: write
  contents: read

jobs:
  lint-test:
    name: Lint & Test Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          
      - name: Go Vet
        working-directory: ./apps/backend
        run: go vet ./...
        
      - name: Go Test
        working-directory: ./apps/backend
        run: go test -v ./...

  build-scan-push:
    name: Build & Scan
    needs: lint-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'apps/backend/**'
            frontend:
              - 'apps/frontend/**'

      - name: Cache Trivy DB
        if: steps.filter.outputs.backend == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}
          restore-keys: |
            trivy-db-
      
      - name: Build Backend Image
        if: steps.filter.outputs.backend == 'true'
        working-directory: ./apps/backend
        run: docker build -t ${{ env.ACR_NAME }}.azurecr.io/backend:${{ github.sha }} .
        
      - name: Build Frontend Image
        if: steps.filter.outputs.frontend == 'true'
        working-directory: ./apps/frontend
        run: docker build -t ${{ env.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }} .
        
      - name: Run Trivy Vulnerability Scanner (backend)
        if: steps.filter.outputs.backend == 'true'
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_CACHE_DIR: ~/.cache/trivy
        with:
          image-ref: '${{ env.ACR_NAME }}.azurecr.io/backend:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          cache-dir: ~/.cache/trivy
          timeout: '5m'
          scanners: 'vuln'
          hide-progress: true
          skip-dirs: ''
          skip-files: ''
          security-checks: 'vuln'
          db-repository: 'public.ecr.aws/aquasecurity/trivy-db:2'
          java-db-repository: 'public.ecr.aws/aquasecurity/trivy-java-db:1'

      - name: Push Backend Image to ACR
        if: steps.filter.outputs.backend == 'true'
        run: |
          az acr login --name ${{ env.ACR_NAME }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/backend:${{ github.sha }}

      - name: Push Frontend Image to ACR
        if: steps.filter.outputs.frontend == 'true'
        run: |
          az acr login --name ${{ env.ACR_NAME }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }}

      - name: Deploy Backend to ACA (Canary 80/20)
        if: steps.filter.outputs.backend == 'true'
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          REVISION_SUFFIX="canary-${SHORT_SHA}"
          VERSION="${SHORT_SHA}-canary"
          
          # Get stable revision name BEFORE deploying the new one
          STABLE_REV=$(az containerapp revision list -n ${{ env.BACKEND_APP_NAME }} -g ${{ env.RG_NAME }} --query "[?properties.trafficWeight > \`0\`].name | [0]" -o tsv)
          STABLE_WEIGHT=80
          CANARY_WEIGHT=20
          
          # Deploy new revision
          az containerapp update \
            --name ${{ env.BACKEND_APP_NAME }} \
            --resource-group ${{ env.RG_NAME }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/backend:${{ github.sha }} \
            --revision-suffix $REVISION_SUFFIX \
            --set-env-vars APP_VERSION=$VERSION

          # Set traffic split
          az containerapp ingress traffic set \
            --name ${{ env.BACKEND_APP_NAME }} \
            --resource-group ${{ env.RG_NAME }} \
            --revision-weight ${STABLE_REV}=${STABLE_WEIGHT} ${{ env.BACKEND_APP_NAME }}--${REVISION_SUFFIX}=${CANARY_WEIGHT}
            
          # Add labels
          az containerapp revision label add -n ${{ env.BACKEND_APP_NAME }} -g ${{ env.RG_NAME }} --label stable --revision ${STABLE_REV} -y
          az containerapp revision label add -n ${{ env.BACKEND_APP_NAME }} -g ${{ env.RG_NAME }} --label canary --revision ${{ env.BACKEND_APP_NAME }}--${REVISION_SUFFIX} -y

          # Deactivate 0 traffic active revisions
          az containerapp revision list -n ${{ env.BACKEND_APP_NAME }} -g ${{ env.RG_NAME }} --query "[?properties.active && properties.trafficWeight == \`0\`].name" -o tsv | while read rev; do echo "Deactivating $rev"; az containerapp revision deactivate -n ${{ env.BACKEND_APP_NAME }} -g ${{ env.RG_NAME }} --revision "$rev"; done

      - name: Deploy Frontend to ACA (Canary 80/20)
        if: steps.filter.outputs.frontend == 'true'
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          REVISION_SUFFIX="canary-${SHORT_SHA}"
          VERSION="${SHORT_SHA}-canary"
          
          # Get stable revision name BEFORE deploying the new one
          STABLE_REV=$(az containerapp revision list -n ${{ env.FRONTEND_APP_NAME }} -g ${{ env.RG_NAME }} --query "[?properties.trafficWeight > \`0\`].name | [0]" -o tsv)
          STABLE_WEIGHT=80
          CANARY_WEIGHT=20

          # Deploy new revision
          az containerapp update \
            --name ${{ env.FRONTEND_APP_NAME }} \
            --resource-group ${{ env.RG_NAME }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }} \
            --revision-suffix $REVISION_SUFFIX \
            --set-env-vars APP_VERSION=$VERSION
          
          # Set traffic split
          az containerapp ingress traffic set \
            --name ${{ env.FRONTEND_APP_NAME }} \
            --resource-group ${{ env.RG_NAME }} \
            --revision-weight ${STABLE_REV}=${STABLE_WEIGHT} ${{ env.FRONTEND_APP_NAME }}--${REVISION_SUFFIX}=${CANARY_WEIGHT}

          # Add labels
          az containerapp revision label add -n ${{ env.FRONTEND_APP_NAME }} -g ${{ env.RG_NAME }} --label stable --revision ${STABLE_REV} -y
          az containerapp revision label add -n ${{ env.FRONTEND_APP_NAME }} -g ${{ env.RG_NAME }} --label canary --revision ${{ env.FRONTEND_APP_NAME }}--${REVISION_SUFFIX} -y

          # Deactivate 0 traffic active revisions
          az containerapp revision list -n ${{ env.FRONTEND_APP_NAME }} -g ${{ env.RG_NAME }} --query "[?properties.active && properties.trafficWeight == \`0\`].name" -o tsv | while read rev; do echo "Deactivating $rev"; az containerapp revision deactivate -n ${{ env.FRONTEND_APP_NAME }} -g ${{ env.RG_NAME }} --revision "$rev"; done

      - name: Notify Telegram on Success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d parse_mode="HTML" \
          -d text="✅ <b>Deployment Successful!</b> ✅%0A<b>Repo:</b> ${{ github.repository }}%0A<b>Workflow:</b> CI Pipeline%0A<b>Commit:</b> ${{ github.sha }}%0A<a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View Run Details</a>"

      - name: Notify Telegram on Failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d parse_mode="HTML" \
          -d text="🚨 <b>GitHub Actions Failed!</b> 🚨%0A<b>Repo:</b> ${{ github.repository }}%0A<b>Workflow:</b> CI Pipeline%0A<b>Commit:</b> ${{ github.sha }}%0A<a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View Run Details</a>%0A%0A<i>Azure SRE Agent will analyze the issue.</i>"