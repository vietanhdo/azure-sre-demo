basePath: /
definitions:
  handlers.Order:
    properties:
      id:
        type: string
      status:
        type: string
      total:
        type: number
    type: object
  handlers.Product:
    properties:
      id:
        type: string
      name:
        type: string
      price:
        type: number
    type: object
  v2.HeinekenDashboardResponse:
    properties:
      breweryDora:
        items:
          $ref: '#/definitions/v2.Metric'
        type: array
      location:
        type: string
      status:
        type: string
      systemMetrics:
        items:
          $ref: '#/definitions/v2.Metric'
        type: array
      timestamp:
        type: string
    type: object
  v2.Metric:
    properties:
      label:
        type: string
      status:
        description: '"good", "warning", "critical"'
        type: string
      trend:
        description: '"up", "down", "stable"'
        type: string
      unit:
        type: string
      value:
        type: string
    type: object
info:
  contact: {}
  description: This is a sample API for the Azure SRE Demo project.
  title: Azure SRE Demo API
  version: "1.0"
paths:
  /api/orders:
    get:
      description: get all orders in the system
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.Order'
            type: array
      summary: Get all orders
      tags:
      - app
  /api/products:
    get:
      description: get all products in the system
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.Product'
            type: array
      summary: Get all products
      tags:
      - app
  /api/v2/heineken/metrics:
    get:
      description: get the regional metrics for Heineken SRE dashboard
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v2.HeinekenDashboardResponse'
      summary: Get Heineken metrics
      tags:
      - heineken
  /api/version:
    get:
      description: get the version, commit sha, and build time
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get application version
      tags:
      - system
  /fault/error/disable:
    post:
      description: stop injecting HTTP 500 errors
      produces:
      - text/plain
      responses:
        "200":
          description: Errors disabled
          schema:
            type: string
      summary: Disable 500 errors
      tags:
      - fault
  /fault/error/enable:
    post:
      description: start injecting HTTP 500 errors into responses
      produces:
      - text/plain
      responses:
        "200":
          description: Errors enabled
          schema:
            type: string
      summary: Enable 500 errors
      tags:
      - fault
  /fault/latency/disable:
    post:
      description: stop injecting latency
      produces:
      - text/plain
      responses:
        "200":
          description: Latency disabled
          schema:
            type: string
      summary: Disable response latency
      tags:
      - fault
  /fault/latency/enable:
    post:
      description: inject latency into responses
      parameters:
      - default: 2000
        description: Milliseconds of latency
        in: query
        name: ms
        type: integer
      produces:
      - text/plain
      responses:
        "200":
          description: Latency enabled
          schema:
            type: string
      summary: Enable response latency
      tags:
      - fault
  /fault/oom:
    post:
      description: starts an infinite allocation loop to crash the app
      produces:
      - text/plain
      responses:
        "202":
          description: OOM simulation started
          schema:
            type: string
      summary: Trigger Out Of Memory
      tags:
      - fault
  /fault/status:
    get:
      description: returns current fault injection toggles and memory stats
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get fault injection status
      tags:
      - fault
  /healthz:
    get:
      description: get the health status of the application
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: System health check
      tags:
      - system
  /ready:
    get:
      description: get the readiness status of the application
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
      summary: System readiness check
      tags:
      - system
swagger: "2.0"
